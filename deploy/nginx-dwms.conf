# =============================================================================
# Nginx Configuration for DWMS
# Domain: dwms.run.place
# =============================================================================
# Place this at: /etc/nginx/sites-available/dwms
# Symlink:       ln -s /etc/nginx/sites-available/dwms /etc/nginx/sites-enabled/
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name dwms.run.place www.dwms.run.place;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dwms.run.place www.dwms.run.place;

    # -------------------------------------------------------------------------
    # SSL (Let's Encrypt / Certbot)
    # -------------------------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/dwms.run.place/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dwms.run.place/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # -------------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # -------------------------------------------------------------------------
    # Client limits
    # -------------------------------------------------------------------------
    client_max_body_size 50M;

    # -------------------------------------------------------------------------
    # Frontend (React SPA) — Serve built files
    # -------------------------------------------------------------------------
    root /opt/dwms/Front-End/dist;
    index index.html;

    # React SPA — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # Backend API — Proxy to Daphne
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # WebSocket — Proxy upgrade to Daphne
    # -------------------------------------------------------------------------
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # Keep WebSocket alive for 24h
    }

    # -------------------------------------------------------------------------
    # Static Files (Django admin CSS/JS)
    # -------------------------------------------------------------------------
    location /static/ {
        alias /opt/dwms/Back-End/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # -------------------------------------------------------------------------
    # Media Files (User uploads — QR codes, etc.)
    # -------------------------------------------------------------------------
    location /media/ {
        alias /opt/dwms/Back-End/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # -------------------------------------------------------------------------
    # Frontend static assets (JS, CSS, images from Vite build)
    # -------------------------------------------------------------------------
    location /assets/ {
        root /opt/dwms/Front-End/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # -------------------------------------------------------------------------
    # Deny hidden files
    # -------------------------------------------------------------------------
    location ~ /\. {
        deny all;
    }
}
